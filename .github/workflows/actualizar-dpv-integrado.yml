name: Actualizar DPV Integrado

on:
  schedule:
    # Tres veces al día durante horario de verano peninsular:
    # 10:21 UTC = 12:21 hora peninsular
    # 14:21 UTC = 16:21 hora peninsular
    # 16:21 UTC = 18:21 hora peninsular
    - cron: "21 10,14,16 * * *"

  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  actualizar-dpv-integrado:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Actualizar DPV AEMET
        run: |
          echo "======================================"
          echo "Actualizando DPV AEMET"
          echo "======================================"

          if python scripts/update_dpv_aemet.py; then
            echo "AEMET actualizado correctamente"
          else
            echo "::warning::AEMET ha fallado. Se mantiene la última versión disponible."
          fi

      - name: Actualizar DPV AVAMET
        run: |
          echo "======================================"
          echo "Actualizando DPV AVAMET"
          echo "======================================"

          if python scripts/update_dpv.py; then
            echo "AVAMET actualizado correctamente"
          else
            echo "::warning::AVAMET ha fallado. Se mantiene la última versión disponible."
          fi

      - name: Actualizar DPV Meteoclimatic
        run: |
          echo "======================================"
          echo "Actualizando DPV Meteoclimatic"
          echo "======================================"

          if python scripts/update_dpv_meteoclimatic.py; then
            echo "Meteoclimatic actualizado correctamente"
          else
            echo "::warning::Meteoclimatic ha fallado. Se mantiene la última versión disponible."
          fi

      - name: Generar DPV integrado
        run: |
          echo "======================================"
          echo "Generando DPV integrado"
          echo "======================================"

          python scripts/update_dpv_integrado.py

      - name: Guardar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Añadiendo archivos generados..."

          git add docs/dpv_aemet.geojson 2>/dev/null || true
          git add docs/metadata_aemet.json 2>/dev/null || true

          git add docs/dpv.geojson 2>/dev/null || true
          git add docs/metadata.json 2>/dev/null || true

          git add docs/dpv_meteoclimatic.geojson 2>/dev/null || true
          git add docs/metadata_meteoclimatic.json 2>/dev/null || true

          git add docs/dpv_integrado.geojson 2>/dev/null || true
          git add docs/metadata_integrado.json 2>/dev/null || true

          if ! git diff --staged --quiet; then
            git commit -m "Actualiza DPV integrado"
            git push
          else
            echo "Sin cambios que guardar"
          fi
