name: Actualizar DPV AVAMET

on:
  workflow_dispatch:

  permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AVAMET_USER_AGENT: "MetVLC-DPV/1.0 uso divulgativo no comercial - Fuente AVAMET - https://metvlc.blogspot.com"

jobs:
  actualizar-dpv:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Calcular DPV desde AVAMET
        run: python scripts/update_dpv.py

      - name: Guardar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/dpv.geojson docs/metadata.json

          if ! git diff --staged --quiet; then
            git commit -m "Actualiza DPV AVAMET"
            git push
          else
            echo "Sin cambios que guardar"
          fi
