name: Actualizar DPV AVAMET

on:
  schedule:
    # Cada hora, minuto 10 UTC
    - cron: "10 * * * *"

  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  actualizar-dpv:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Calcular DPV desde AVAMET
        run: python scripts/update_dpv.py

      - name: Guardar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/dpv.geojson docs/metadata.json
          git commit -m "Actualiza DPV AVAMET" || echo "Sin cambios que guardar"
          git push
