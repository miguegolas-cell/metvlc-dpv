name: Actualizar DPV Meteoclimatic

on:
  schedule:
    # Tres veces al día durante horario de verano peninsular:
    # 10:05 UTC = 12:05 hora peninsular
    # 14:05 UTC = 16:05 hora peninsular
    # 16:05 UTC = 18:05 hora peninsular
    - cron: "6 10,14,16 * * *"

  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  actualizar-dpv-meteoclimatic:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Calcular DPV desde Meteoclimatic
        run: python scripts/update_dpv_meteoclimatic.py

      - name: Guardar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/dpv_meteoclimatic.geojson docs/metadata_meteoclimatic.json

          if ! git diff --staged --quiet; then
            git commit -m "Actualiza DPV Meteoclimatic"
            git push
          else
            echo "Sin cambios que guardar"
          fi
